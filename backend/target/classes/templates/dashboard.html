<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="pageTitle" class="h4 fw-bold">Dashboard Overview</div>

    <div layout:fragment="content">
        <!-- Dashboard Statistics Cards -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mb-4">
            <div class="col">
                <div class="card p-3 d-flex flex-row align-items-center">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3"><i class="fas fa-dollar-sign text-primary fa-lg"></i></div>
                    <div><h6 class="text-secondary small mb-1 fw-bold">Total Sales</h6><h4 class="mb-0 fw-bold">$45,230</h4></div>
                </div>
            </div>
            <div class="col">
                <div class="card p-3 d-flex flex-row align-items-center">
                    <div class="bg-success bg-opacity-10 p-3 rounded-circle me-3"><i class="fas fa-shopping-bag text-success fa-lg"></i></div>
                    <div><h6 class="text-secondary small mb-1 fw-bold">Sales Orders</h6><h4 class="mb-0 fw-bold">124</h4></div>
                </div>
            </div>
            <div class="col">
                <div class="card p-3 d-flex flex-row align-items-center">
                    <div class="bg-info bg-opacity-10 p-3 rounded-circle me-3"><i class="fas fa-users text-info fa-lg"></i></div>
                    <div><h6 class="text-secondary small mb-1 fw-bold">New Customers</h6><h4 class="mb-0 fw-bold">12</h4></div>
                </div>
            </div>
            <div class="col">
                <div class="card p-3 d-flex flex-row align-items-center">
                    <div class="bg-warning bg-opacity-10 p-3 rounded-circle me-3"><i class="fas fa-box text-warning fa-lg"></i></div>
                    <div><h6 class="text-secondary small mb-1 fw-bold">Stock Items</h6><h4 class="mb-0 fw-bold">842</h4></div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Sales Chart (Placeholder) -->
            <div class="col-lg-8">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">Sales vs Purchase Trend</h5>
                        <select class="form-select form-select-sm" style="width: 150px;">
                            <option selected>Last 6 Months</option>
                            <option value="1">Last Year</option>
                        </select>
                    </div>
                    <canvas id="salesChart" height="150"></canvas>
                </div>
            </div>

            <!-- Low Stock Alerts -->
            <div class="col-lg-4">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4"><i class="fas fa-exclamation-triangle text-warning me-2"></i> Low Stock Alerts</h5>
                    <div class="list-group list-group-flush">
                        <div class="list-group-item px-0 border-0 mb-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div><h6 class="mb-0 fw-bold text-dark">Logitech G502 Mouse</h6><small class="text-secondary">SKU: MS-LGG-502</small></div>
                                <span class="badge bg-danger">Stock: 2</span>
                            </div>
                        </div>
                        <div class="list-group-item px-0 border-0 mb-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div><h6 class="mb-0 fw-bold text-dark">Dell Monitor 24"</h6><small class="text-secondary">SKU: MN-DL24-IPS</small></div>
                                <span class="badge bg-danger">Stock: 5</span>
                            </div>
                        </div>
                        <div class="list-group-item px-0 border-0">
                            <div class="d-flex justify-content-between align-items-start">
                                <div><h6 class="mb-0 fw-bold text-dark">i7-13700K Processor</h6><small class="text-secondary">SKU: CPU-INT-137K</small></div>
                                <span class="badge bg-warning text-dark">Stock: 15</span>
                            </div>
                        </div>
                    </div>
                    <a href="/products" class="btn btn-light mt-3 w-100 fw-bold text-primary">View Full Inventory</a>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Sales ($)',
                        data: [12000, 19000, 15000, 25000, 22000, 30000],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true, tension: 0.4, borderWeight: 4
                    }, {
                        label: 'Purchase ($)',
                        data: [7000, 11000, 8000, 15000, 12000, 18000],
                        borderColor: '#94a3b8',
                        borderDash: [5, 5],
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }
                }
            });
        </script>
    </th:block>
</body>
</html>
