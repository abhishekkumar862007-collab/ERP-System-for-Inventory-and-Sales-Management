<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head>
    <title>Customers</title>
</head>
<body>
    <div layout:fragment="pageTitle" class="h4 fw-bold">Customer Management</div>

    <div layout:fragment="content">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Customer Directory</h5>
                <button class="btn btn-primary btn-sm px-3 fw-bold"><i class="fas fa-plus me-2"></i>Add Customer</button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover table-custom align-middle">
                    <thead>
                        <tr>
                            <th>Customer Name</th>
                            <th>Email</th>
                            <th>Phone Number</th>
                            <th>Address & GSTIN</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary bg-opacity-10 rounded-circle p-2 px-3 fw-bold text-primary me-3">JD</div>
                                    <h6 class="mb-0 fw-bold">John Doe</h6>
                                </div>
                            </td>
                            <td>john@example.com</td>
                            <td>+1 234 567 8901</td>
                            <td><small class="fw-medium text-secondary">GSTIN: 22AAAAA0000A1Z5</small></td>
                            <td class="text-end"><button class="btn btn-light btn-sm text-primary"><i class="fas fa-edit"></i></button></td>
                        </tr>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary bg-opacity-10 rounded-circle p-2 px-3 fw-bold text-primary me-3">AS</div>
                                    <h6 class="mb-0 fw-bold">Alice Smith</h6>
                                </div>
                            </td>
                            <td>alice@corporate.net</td>
                            <td>+1 987 654 3210</td>
                            <td><small class="fw-medium text-secondary">GSTIN: 33BBBBB1111B2Z6</small></td>
                            <td class="text-end"><button class="btn btn-light btn-sm text-primary"><i class="fas fa-edit"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
