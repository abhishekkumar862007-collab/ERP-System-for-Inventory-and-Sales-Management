<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head>
    <title>Products</title>
</head>
<body>
    <div layout:fragment="pageTitle" class="h4 fw-bold">Inventory Management</div>

    <div layout:fragment="content">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Product List</h5>
                <button class="btn btn-primary btn-sm px-3 fw-bold"><i class="fas fa-plus me-2"></i>Add Product</button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover table-custom align-middle">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold text-primary">MS-LGG-502</td>
                            <td class="fw-bold">Logitech G502 Mouse</td>
                            <td>Peripherals</td>
                            <td>$45.00</td>
                            <td class="fw-bold text-danger">2</td>
                            <td><span class="badge bg-danger rounded-pill">Low Stock</span></td>
                            <td class="text-end"><button class="btn btn-light btn-sm text-primary"><i class="fas fa-edit"></i></button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-primary">MN-DL24-IPS</td>
                            <td class="fw-bold">Dell Monitor 24"</td>
                            <td>Monitors</td>
                            <td>$120.00</td>
                            <td class="fw-bold">5</td>
                            <td><span class="badge bg-danger rounded-pill">Low Stock</span></td>
                            <td class="text-end"><button class="btn btn-light btn-sm text-primary"><i class="fas fa-edit"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
